spring:
  application:
    name: gateway-service
  data:
    redis:
      host: localhost
      port: 6379
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${ISSUER_URI}
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/login/**

            - id: admin-service
              uri: lb://ADMIN-SERVICE
              predicates:
                - Path=/admin/**
                
            - id: partner-service
              uri: lb://PARTNER-SERVICE
              predicates:
                - Path=/api/partners/** 

            - id: shipments-service
              uri: lb://SHIPMENTS-SERVICE
              predicates:
                - Path=/api/shipments/** 

            - id: tracking-service
              uri: lb://TRACKING-SERVICE
              predicates:
                - Path=/api/tracking/**  

            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/users/**         
  
server:
  port: 8083

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
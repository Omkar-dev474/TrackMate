spring:
  application:
    name: tracking-service
  datasource:
    url: jdbc:postgresql://localhost:5432/TrackMate
    username: postgres
    password: Omkar@123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: localhost:9092
  cloud:
    function:
      definition: ShipmentResponse

    stream:
      bindings:
        ShipmentResponse-out-0:
          destination: Shipment-details
          content-type: application/json


server:
  port: 8086
  
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: true